services:

  mongodb:
    build:
      context: .
      dockerfile: Dockerfile.mongo
    container_name: mongodb_jogos
    networks:
      - jogos-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_dados_jogos
    ports:
      - "17000:17000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/jogostabuleiro
    depends_on:
      - mongodb
    networks:
      - jogos-network

networks:
  jogos-network:
    driver: bridge
